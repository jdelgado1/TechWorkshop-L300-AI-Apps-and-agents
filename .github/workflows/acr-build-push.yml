name: Build and push container to Azure Container Registry

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Requires a service principal JSON stored in AZURE_CREDENTIALS
      # See: https://github.com/Azure/login
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name "${{ secrets.ACR_NAME }}"

      # Create src/.env at build time from the GitHub secret ENV.
      # This file is NOT committed; it exists only on the ephemeral runner.
      - name: Create .env for Docker build (from secret)
        working-directory: src
        run: |
          printf "%s" "${{ secrets.ENV }}" > .env

      # Build context is src/ (so ONLY src/ files are sent to the Docker daemon).
      - name: Build and push image
        working-directory: src
        run: |
          set -euo pipefail
          ACR_LOGIN_SERVER="$(az acr show --name "${{ secrets.ACR_NAME }}" --query loginServer -o tsv)"
          IMAGE_NAME="${{ secrets.ACR_REPOSITORY }}"
          IMAGE_TAG="${GITHUB_SHA}"

          docker build -t "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" -f Dockerfile .
          docker push "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Remove .env
        if: always()
        working-directory: src
        run: rm -f .env
