name: Deploy Customer Loyalty Agent

on:
  push:
    branches: ["main"]
    paths:
      - "src/app/agents/customerLoyaltyAgent_initializer.py"
      - "src/prompts/CustomerLoyaltyAgentPrompt.txt"
      - "src/app/tools/discountLogic.py"

permissions:
  contents: read

jobs:
  deploy-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create .env for script
        working-directory: src
        run: |
          printf "%s\n" "${{ secrets.ENV }}" > .env
          sed -i 's/\r$//' .env

      - name: Verify .env
        working-directory: src
        run: |
          echo "Lines in .env: $(wc -l < .env)"
          echo "Has COSMOS_ENDPOINT: $(grep -c 'COSMOS_ENDPOINT' .env || true)"
          echo "Has FOUNDRY_ENDPOINT: $(grep -c 'FOUNDRY_ENDPOINT' .env || true)"

      - name: Install dependencies
        working-directory: src
        run: |
          pip install -r requirements.txt

      - name: Deploy Customer Loyalty Agent
        working-directory: src
        run: |
          set -a
          source .env
          set +a
          echo "COSMOS_ENDPOINT is set: ${COSMOS_ENDPOINT:+yes}"
          python app/agents/customerLoyaltyAgent_initializer.py

      - name: Remove .env
        if: always()
        working-directory: src
        run: rm -f .env
